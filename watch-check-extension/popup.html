<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Should I Watch This?</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Should I Watch This?</h1>

    <div class="field">
      <label for="apiKey">OMDb API Key</label>
      <input type="text" id="apiKey" placeholder="Enter your OMDb API key" spellcheck="false" autocomplete="off">
      <a href="https://www.omdbapi.com/apikey.aspx" target="_blank" class="helper-link">Get a free API key &rarr;</a>
    </div>

    <div class="field">
      <label for="imdbSlider">
        IMDB Minimum: <span id="imdbValue">7.3</span>/10
      </label>
      <input type="range" id="imdbSlider" min="1" max="10" step="0.1" value="7.3">
    </div>

    <div class="field">
      <label for="rtSlider">
        Rotten Tomatoes Minimum: <span id="rtValue">70</span>%
      </label>
      <input type="range" id="rtSlider" min="0" max="100" step="5" value="70">
    </div>

    <button id="saveBtn" class="btn primary">Save Settings</button>
    <button id="testBtn" class="btn test">Test API Key</button>
    <div id="testResult" class="test-result" hidden></div>

    <div class="divider"></div>

    <div class="stats">
      <span id="cacheCount">0 titles cached</span>
      <button id="clearCacheBtn" class="btn secondary">Clear Cache</button>
    </div>

    <div id="statusMsg" class="status" hidden></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
